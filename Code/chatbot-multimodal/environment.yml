name: chatbot-multimodal
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - streamlit>=1.28.0
    - langchain>=0.1.0
    - langchain-core>=0.1.0
    - langchain-community>=0.0.10
    - langchain-huggingface>=0.0.1
    - langchain-openai>=0.0.5
    - langchain-text-splitters>=0.0.1
    - docling>=1.0.0
    - faiss-cpu>=1.7.4
    - sentence-transformers>=2.2.2
    - huggingface-hub>=0.19.0
    - transformers>=4.35.0
    - torch>=2.0.0
    - tokenizers>=0.15.0
    - "pandas>=2.0.0,<2.2.0"
    - "numpy>=1.21.0,<1.25.0"
    - bottleneck>=1.3.7
# Usage:
#   conda env create -f environment.yml
#   conda activate chatbot-multimodal
