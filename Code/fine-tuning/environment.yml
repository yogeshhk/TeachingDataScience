name: fine-tuning
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - transformers>=4.40.0
    - peft>=0.10.0
    - trl>=0.8.0
    - datasets>=2.18.0
    - accelerate>=0.29.0
    - bitsandbytes>=0.43.0
    - huggingface-hub>=0.22.0
    - torch>=2.2.0
    - sentencepiece
    - jupyter
# Usage:
#   conda env create -f environment.yml
#   conda activate fine-tuning
#
# Note: GPU recommended. For CPU-only, remove bitsandbytes.
