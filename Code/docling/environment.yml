name: docling
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - streamlit>=1.28.0
    - docling>=1.0.0
    - docling-core>=2.0.0
    - docling-ibm-models>=2.0.0
    - llama-index>=0.10.0
    - llama-index-embeddings-huggingface>=0.2.0
    - llama-index-llms-huggingface>=0.2.0
    - transformers>=4.35.0
    - sentence-transformers>=2.2.2
    - torch>=2.0.0
    - torchvision>=0.15.0
    - pandas>=2.0.0
    - numpy>=1.24.0
    - pillow>=10.0.0
    - pydantic>=2.0.0
    - loguru>=0.7.0
    - tqdm>=4.65.0
    - opencv-python>=4.8.0
    - jupyter>=1.0.0
    - ipywidgets>=8.0.0
    - pytest>=7.0.0
    - pytest-cov>=4.0.0
