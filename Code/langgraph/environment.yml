name: langgraph
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - langgraph>=0.2.0
    - langchain>=0.2.0
    - langchain-community>=0.2.0
    - langchain-openai>=0.1.0
    - langchain-groq>=0.1.0
    - langsmith>=0.1.0
    - openai
    - groq
    - python-dotenv
    - tavily-python
    - jupyter
# Usage:
#   conda env create -f environment.yml
#   conda activate langgraph
#
# Note: Sub-projects (open_deep_research-langcahin-ai, langgraph-harishneel1)
#       have their own dependency files — see their subdirectories.
