name: langchain
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - langchain>=0.2.0
    - langchain-community>=0.2.0
    - langchain-openai>=0.1.0
    - langchain-groq>=0.1.0
    - langchain-text-splitters>=0.2.0
    - openai
    - groq
    - python-dotenv
    - faiss-cpu
    - sentence-transformers
    - streamlit
    - jupyter
# Usage:
#   conda env create -f environment.yml
#   conda activate langchain
