<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Life Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0b18;
      color: #e0e0f0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4a7abf;
      margin-bottom: 6px;
    }

    .born {
      font-size: 12px;
      color: #444;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .age-display {
      font-size: 52px;
      font-weight: 700;
      color: #f0d080;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 6px;
      text-align: center;
    }

    .age-label {
      font-size: 12px;
      color: #555;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }

    .card {
      width: 200px;
      background: #13132a;
      border: 1px solid #1e1e40;
      border-radius: 14px;
      padding: 22px 18px 18px;
      text-align: center;
    }

    .card .label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }

    .card.done .value { color: #7eb8f7; }
    .card.left .value { color: #f07878; }

    .bar-section {
      width: 460px;
      margin-bottom: 14px;
    }

    .bar-wrap {
      height: 18px;
      background: #13132a;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid #1e1e40;
      margin-bottom: 10px;
    }

    #bar {
      height: 100%;
      background: linear-gradient(90deg, #2a4faa, #7eb8f7);
      min-width: 1%;
      border-radius: 9px;
      transition: width 0.5s ease;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #444;
    }

    .bar-meta span { color: #666; }

    .footer {
      margin-top: 50px;
      font-size: 10px;
      color: #2a2a40;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <h1>Life Timer</h1>
  <div class="born">Born 27 March 1973, 11:25 AM &nbsp;&bull;&nbsp; 100-year span</div>

  <div class="age-display" id="age">—</div>
  <div class="age-label">years &bull; months &bull; days old</div>

  <div class="cards">
    <div class="card done">
      <div class="label">Days Done</div>
      <div class="value" id="done">—</div>
    </div>
    <div class="card left">
      <div class="label">Days Left</div>
      <div class="value" id="left">—</div>
    </div>
  </div>

  <div class="bar-section">
    <div class="bar-wrap">
      <div id="bar"></div>
    </div>
    <div class="bar-meta">
      <span><span id="pct">0%</span> of life used</span>
      <span>of <span id="total">—</span> total days</span>
      <span>ends <span id="enddate">—</span></span>
    </div>
  </div>

  <div class="footer">refreshes every minute</div>

  <script src="popup.js"></script>
</body>
</html>
