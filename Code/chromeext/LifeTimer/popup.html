<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Life Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      padding: 20px 18px 18px;
    }

    h1 {
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7eb8f7;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
    }

    .age-badge {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 14px;
    }
    .age-badge span {
      font-size: 18px;
      font-weight: 700;
      color: #f0d080;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }

    .card {
      flex: 1;
      background: #1a1a2e;
      border-radius: 10px;
      padding: 12px 10px 10px;
      text-align: center;
      border: 1px solid #2a2a50;
    }

    .card .label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    .card .value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .card.done  .value { color: #7eb8f7; }
    .card.left  .value { color: #f07878; }

    .bar-wrap {
      background: #1a1a2e;
      border-radius: 8px;
      overflow: hidden;
      height: 22px;
      margin-bottom: 8px;
      border: 1px solid #2a2a50;
    }

    #bar {
      height: 100%;
      background: linear-gradient(90deg, #3a6fd8, #7eb8f7);
      min-width: 2%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #0f0f1a;
      transition: width 0.4s ease;
      white-space: nowrap;
    }

    .meta {
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .meta span { color: #888; }
  </style>
</head>
<body>
  <h1>Life Timer</h1>
  <div class="subtitle">Born 27 March 1973, 11:25 AM &nbsp;|&nbsp; 100-year span</div>

  <div class="age-badge">Age: <span id="age">—</span></div>

  <div class="row">
    <div class="card done">
      <div class="label">Days Done</div>
      <div class="value" id="done">—</div>
    </div>
    <div class="card left">
      <div class="label">Days Left</div>
      <div class="value" id="left">—</div>
    </div>
  </div>

  <div class="bar-wrap">
    <div id="bar">0%</div>
  </div>

  <div class="meta">
    <span id="pct">0%</span> of <span id="total">—</span> days used
    &nbsp;&bull;&nbsp; ends <span id="enddate">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
