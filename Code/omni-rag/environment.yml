name: omni-rag
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - langchain
    - langchain-community
    - langchain-chroma
    - langchain-groq
    - langgraph
    - docling
    - pandas
    - streamlit
    - ragas
    - chromadb
    - python-dotenv
    - tiktoken
    - datasets
    - fastapi
    - uvicorn
    - pydantic
# Usage:
#   conda env create -f environment.yml
#   conda activate omni-rag
