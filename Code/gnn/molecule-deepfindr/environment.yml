name: genai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # PyTorch with CUDA 11.8 (compatible with driver >= 11.8, including 13.x)
    # Use the index URL on first install:
    #   pip install torch torchvision --index-url https://download.pytorch.org/whl/cu118
    - torch>=2.7.1
    - torchvision>=0.22.1
    # PyG core
    - torch-geometric>=2.6.1
    # PyG C++ extensions — install via find-links:
    #   pip install torch-scatter torch-sparse torch-cluster torch-spline-conv
    #       -f https://data.pyg.org/whl/torch-2.7.1+cu118.html
    - torch-scatter>=2.1.2
    - torch-sparse>=0.6.18
    - torch-cluster>=1.6.3
    - torch-spline-conv>=1.2.2
    # Chemistry
    - rdkit>=2024.3.1
    # Data / visualisation
    - seaborn>=0.12.2
    - pandas>=2.2.0
    - matplotlib>=3.8.0
