name: llamaindex
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - llama-index>=0.10.0
    - llama-index-core>=0.10.0
    - llama-index-agent-openai
    - llama-index-embeddings-openai
    - llama-index-llms-openai
    - llama-index-readers-file
    - llama-index-vector-stores-chroma
    - chromadb
    - openai
    - python-dotenv
    - pandas
    - numpy
    - jupyter
# Usage:
#   conda env create -f environment.yml
#   conda activate llamaindex
#
# Note: llamaindex/requirements.txt contains pinned versions from a specific run.
#       This environment.yml uses unpinned versions for broader compatibility.
#       If exact reproducibility is needed, use: pip install -r requirements.txt
