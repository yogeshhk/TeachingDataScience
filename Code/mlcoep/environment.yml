name: mlcoep
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.9
  - pip
  - ipython

  # Data Manipulation & Analysis
  - numpy>=1.21.0
  - pandas>=1.3.0

  # Machine Learning & Statistics
  - scikit-learn>=1.0.0
  - scipy>=1.7.0

  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0

  # Jupyter & Notebooks
  - jupyter>=1.0.0
  - jupyterlab>=3.0.0
  - notebook>=6.4.0
  - ipykernel>=6.0.0

  # Data Display & Formatting
  - tabulate

  # Performance & Utilities
  - tqdm

  # Additional useful packages
  - pytest>=6.0.0       # For testing (optional)

  # pip packages (if needed)
  - pip

  # Note: Add more packages here if needed during course
  # Example: - tensorflow (for deep learning section)
  #          - xgboost (for advanced ensemble methods)

# To create environment:
# conda env create -f environment.yml

# To activate:
# conda activate mlcoep

# To deactivate:
# conda deactivate

# To update:
# conda env update -f environment.yml --prune

# To remove:
# conda env remove --name mlcoep
