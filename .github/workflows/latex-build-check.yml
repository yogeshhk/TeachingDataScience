name: LaTeX Build Check

on:
  pull_request:
    paths:
      - "LaTeX/**"
  push:
    branches: [main, master]
    paths:
      - "LaTeX/**"

jobs:
  compile-flagship-decks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        driver:
          - Main_Seminar_ML_Intro_Presentation.tex
          - Main_Seminar_Python_Basic_Intro_Presentation.tex
          - Main_Seminar_LLM_Intro_Presentation.tex
    steps:
      - uses: actions/checkout@v4

      - name: Compile ${{ matrix.driver }}
        uses: dante-ev/latex-action@v2
        with:
          root_file: ${{ matrix.driver }}
          working_directory: LaTeX
          # Uses texify-equivalent multi-pass compilation (latexmk) bundled in the action's
          # TeX Live image. This is a smoke test, not a full-repo build: only a handful of
          # representative decks (one per subject area) are compiled on every PR, to catch
          # template/package regressions without the cost of compiling all ~280 drivers.
